<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | WoWacademy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --primary-dark: #1b5e20;
            --primary-soft: #f0fdf4;
            --dark: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-gradient-start: #e8f5e9; 
            --bg-gradient-middle: #f1f8e9;
            --bg-body: #f8fafc;
            --white: #ffffff;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-soft: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, 
                var(--bg-gradient-start) 0%, 
                var(--bg-gradient-middle) 35%, 
                var(--bg-body) 70%
            );
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* NAVEGACIÓN */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--dark); letter-spacing: -0.5px; }
        .nav-logo span { color: var(--primary); }
        .nav-back { 
            text-decoration: none; 
            color: var(--primary); 
            font-weight: 600; 
            font-size: 0.95rem;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-back:hover { transform: translateX(-3px); }

        /* HEADER */
        .header-section { 
            text-align: center; 
            padding: 60px 20px 40px; 
            max-width: 800px;
            margin: 0 auto;
        }
        .header-section h1 { 
            font-size: clamp(2.5rem, 5vw, 3.5rem); 
            font-weight: 900; 
            margin-bottom: 16px; 
            color: var(--dark);
            letter-spacing: -1.5px;
        }
        .header-section h1 span { color: var(--primary); }
        .header-section p { color: var(--text-muted); font-size: 1.2rem; font-weight: 500; }

        /* BUSCADOR */
        .search-container { max-width: 650px; margin: 0 auto 60px; padding: 0 20px; position: relative; }
        .search-wrapper { position: relative; }
        
        #courseSearch {
            width: 100%; 
            padding: 20px 30px; 
            border-radius: var(--radius-md);
            border: 1px solid rgba(226, 232, 240, 0.8); 
            font-size: 1.05rem; 
            outline: none;
            background: var(--white);
            box-shadow: var(--shadow-soft);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }
        #courseSearch:focus {
            border-color: var(--primary-light);
            box-shadow: 0 10px 25px -5px rgba(46, 125, 50, 0.1);
            transform: translateY(-2px);
        }

        /* GRID */
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px 80px; }
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-soft);
        }

        .course-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .image-box {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .image-box img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain; 
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .course-card:hover .image-box img {
            transform: scale(1.15) rotate(3deg);
        }

        .course-content { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }

        .badge {
            display: inline-block;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 50px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .course-content h3 { 
            font-size: 1.4rem; 
            margin-bottom: 12px; 
            font-weight: 800; 
            color: var(--dark);
            line-height: 1.25;
            letter-spacing: -0.5px;
        }
        .course-content p { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            margin-bottom: 25px; 
            flex-grow: 1; 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-enroll {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: var(--radius-md);
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
        }

        .btn-enroll:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(46, 125, 50, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            grid-column: 1 / -1;
            color: var(--text-muted);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .header-section { padding: 40px 20px; }
            .header-section h1 { font-size: 2.2rem; }
            .catalog-grid { gap: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo"><span>WoW</span>academy</a>
        <a href="index.html" class="nav-back">← Volver al inicio</a>
    </nav>

    <header class="header-section">
        <h1>Explora nuestra <span>Formación</span></h1>
        <p>Cursos prácticos diseñados para impulsar tu carrera tecnológica.</p>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="courseSearch" placeholder="¿Qué quieres aprender hoy? Busca por tecnología...">
        </div>
    </div>

    <div class="container">
        <div id="catalogGrid" class="catalog-grid">
            <!-- Los cursos se cargan dinámicamente -->
        </div>
    </div>

    <script>
        let todosLosCursos = [];

        async function fetchPublicCourses() {
            try {
                // Simulación de carga para desarrollo o conexión con API
                const response = await fetch('/api/cursos');
                todosLosCursos = await response.json();
                renderCursos(todosLosCursos);
            } catch (e) {
                console.error("Error cargando cursos");
                document.getElementById('catalogGrid').innerHTML = 
                    '<div class="empty-state">No se pudieron cargar los cursos. Por favor, intenta más tarde.</div>';
            }
        }

        function renderCursos(cursosFiltrados) {
            const container = document.getElementById('catalogGrid');
            container.innerHTML = '';

            if(cursosFiltrados.length === 0) {
                container.innerHTML = '<div class="empty-state">No se encontraron cursos que coincidan con tu búsqueda.</div>';
                return;
            }

            cursosFiltrados.forEach((curso, index) => {
                const rutaImagen = curso.imagen.startsWith('http') ? curso.imagen : `/${curso.imagen}`;
                const card = document.createElement('div');
                card.className = 'course-card';
                card.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="image-box">
                        <img src="${rutaImagen}" alt="${curso.titulo}" onerror="this.src='https://via.placeholder.com/400x220?text=WoWacademy'">
                    </div>
                    <div class="course-content">
                        <span class="badge">Certificación Oficial</span>
                        <h3>${curso.titulo}</h3>
                        <p>${curso.descripcion}</p>
                        <a href="#" class="btn-enroll">Ver detalles del curso</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('courseSearch').addEventListener('input', (e) => {
            const busqueda = e.target.value.toLowerCase();
            const filtrados = todosLosCursos.filter(c => 
                c.titulo.toLowerCase().includes(busqueda) || 
                c.descripcion.toLowerCase().includes(busqueda)
            );
            renderCursos(filtrados);
        });

        window.onload = fetchPublicCourses;
    </script>
</body>
</html>
