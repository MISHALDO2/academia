<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Alumno | WoWcademy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--light); color: var(--dark); }

        /* HEADER PANEL */
        header {
            background: white;
            padding: 20px 8%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-welcome h1 { font-size: 1.5rem; font-weight: 900; }
        .user-welcome span { color: var(--primary); }

        /* CONTENEDOR PRINCIPAL */
        main { padding: 40px 8%; }
        .section-header { margin-bottom: 30px; }
        
        /* GRID DE CURSOS */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* TARJETA DE CURSO */
        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .course-img {
            width: 100%;
            height: 160px;
            background: #cbd5e1; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .course-content { padding: 20px; }
        .course-content h3 { margin-bottom: 15px; font-size: 1.2rem; font-weight: 700; }

        /* BARRA DE PROGRESO */
        .progress-container {
            background: #f1f5f9;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
        }

        .btn-continue {
            display: block;
            margin-top: 20px;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            transition: background 0.3s;
        }

        .btn-continue:hover { background: #1b5e20; }

        /* ESTADO DE CARGA */
        #loading { text-align: center; font-weight: 600; color: var(--primary); padding: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="user-welcome">
            <h1>Hola de nuevo, <span>Alumno</span></h1>
        </div>
        <div class="nav-links">
            <a href="index.html" style="text-decoration: none; color: var(--dark); font-weight: 600;">Cerrar sesión</a>
        </div>
    </header>

    <main>
        <div class="section-header">
            <h2>Mis cursos activos</h2>
        </div>

        <div id="loading">Cargando tus cursos...</div>
        <div class="courses-grid" id="coursesContainer">
            </div>
    </main>

<script>
    async function loadCourses() {
        try {
            const response = await fetch('/api/cursos');
            const cursos = await response.json();
            const container = document.getElementById('coursesContainer');
            const loadingText = document.getElementById('loading');

            container.innerHTML = '';
            if (loadingText) loadingText.style.display = 'none';
            cursos.forEach(curso => {
                const card = document.createElement('div');
                card.className = 'course-card';

                card.innerHTML = `
                    <div class="course-img" style="background: #2e7d32; color: white;">📚</div>
                    <div class="course-content">
                        <h3>${curso.titulo}</h3>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${curso.progreso}%"></div>
                        </div>
                        <span class="progress-text">Progreso: ${curso.progreso}%</span>
                        <a href="#" class="btn-continue">Continuar aprendiendo</a>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            console.error("Error al cargar cursos:", error);
            document.getElementById('loading').innerText = "Error: El servidor no responde.";
        }
    }

    // Iniciar carga
    window.onload = loadCourses;
</script>
</body>
</html>
