<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias y Avisos | WoWacademy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #14532d;
            --primary-light: #4ade80;
            --accent: #22c55e;
            --dark: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-soft: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(34, 197, 94, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(22, 163, 74, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main); 
            line-height: 1.6;
        }

        /* NAVEGACIÓN */
        .nav-wrapper {
            position: sticky;
            top: 20px;
            z-index: 1000;
            padding: 0 5%;
        }

        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            box-shadow: var(--shadow-soft);
        }

        .nav-logo { 
            font-weight: 800; 
            font-size: 1.2rem; 
            text-decoration: none; 
            color: var(--dark); 
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-logo span { 
            color: var(--primary); 
        }
        
        .nav-back { 
            text-decoration: none; 
            color: var(--white); 
            background: var(--dark);
            color: white;
            font-weight: 600; 
            font-size: 0.8rem; 
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .nav-back:hover { 
            background: var(--primary);
            transform: scale(1.05);
        }

        /* HERO SECTION */
        .container {
            max-width: 900px;
            margin: 40px auto 100px;
            padding: 0 24px;
        }

        .page-header {
            text-align: left;
            margin-bottom: 40px;
            padding: 40px 0;
        }

        .page-header h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -2px;
            background: linear-gradient(to right, var(--dark), var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
        }

        /* FILTROS */
        .news-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* CONTENEDOR */
        .news-feed {
            display: grid;
            gap: 24px;
        }

        /* FOOTER */
        footer {
            margin-top: 100px;
            padding: 80px 24px;
            text-align: center;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
        }

        .footer-copy {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Ajustes para móviles */
        @media (max-width: 768px) {
            .nav-wrapper { 
                top: 10px; 
            }
            .page-header { 
                text-align: center; 
            }
            .page-header p { 
                margin: 0 auto; 
            }
            .news-filters { 
                justify-content: flex-start; 
            }
        }
    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav>
            <a href="index.html" class="nav-logo"><span>WoW</span>academy</a>
            <a href="alumno.html" class="nav-back">Volver</a>
        </nav>
    </div>

    <div class="container">
        <header class="page-header">
            <h1>Noticias y <br>Avisos Académicos</h1>
            <p>Mantente al día con las últimas actualizaciones y eventos de la plataforma.</p>
        </header>

        <div class="news-filters">
            <button class="filter-btn active">Todo</button>
            <button class="filter-btn">Novedades</button>
            <button class="filter-btn">Eventos</button>
            <button class="filter-btn">Mantenimiento</button>
        </div>

        <main class="news-feed">
            <article class="news-card" style="background: white; border-radius: 24px; padding: 32px; border: 1px solid #e2e8f0; box-shadow: var(--shadow-soft);">
                <div style="margin-bottom: 12px; display: flex; gap: 8px;">
                    <span style="background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase;">Novedad</span>
                </div>
                <h2 style="font-size: 1.5rem; margin-bottom: 12px; letter-spacing: -0.5px;">TITULO</h2>
                <p style="color: var(--text-muted);">CUERPO.</p>
            </article>
        </main>
    </div>

    <footer>
        <div class="footer-content">
            <a href="#" class="footer-logo"><span>WoW</span>academy</a>
            <p class="footer-copy">© 2026 WoWacademy by Win O Win. <br>Impulsando el talento tecnológico.</p>
        </div>
    </footer>

</body>
</html>
